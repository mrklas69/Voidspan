<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- M-110 — protáhlejší, difuznější eliptická galaxie severovýchodně
       od M-31. Menší surface brightness než M-32, protáhlá ve směru
       hlavní osy Andromedy. -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8a8" stop-opacity="0.72"/>
      <stop offset="40%" stop-color="#b88860" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#503820" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="50" rx="90" ry="34" transform="rotate(-20 100 50)" fill="url(#g)"/>
</svg>
