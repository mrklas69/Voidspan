name: Deploy to GitHub Pages

# Build + deploy apps/client na GitHub Pages při každém push do main.
# Výsledek: https://mrklas69.github.io/Voidspan/
#
# Vite `base: "./"` v apps/client/vite.config.ts → relativní cesty, funguje ze subpath.
# Žádná gh-pages branch — artifact-based deploy přes actions/deploy-pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages potřebuje tyto permissions pro deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Zajistí, že běží jen jeden deploy najednou (novější push zruší starší běh).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm verze se bere z package.json `packageManager` pole (10.33.0).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
